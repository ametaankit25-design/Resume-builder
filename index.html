<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/unnamed.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyResume.io</title>

    <!--
      ✅ DARK MODE INIT — must run synchronously BEFORE React renders.
      This reads localStorage and applies the "dark" class to <html>
      instantly, preventing a white flash on page load and ensuring
      all Tailwind dark: classes work from the very first paint.
    -->
    <script>
      (function () {
        var theme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (theme === "dark" || (!theme && prefersDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
